<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f5f5f5;--card:#fff;--accent:#e8413c;--accent2:#ff7b54;--accent3:#2ec4b6;--text:#1a1a2e;--muted:#8c8c9a;--border:#eee;--radius:16px;--shadow:0 2px 12px rgba(0,0,0,0.06)}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','Helvetica Neue','Microsoft YaHei',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;position:relative}

/* Header */
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:52px 20px 20px;text-align:center;position:sticky;top:0;z-index:100}
.header-title{font-size:20px;font-weight:800;margin-bottom:4px;letter-spacing:1px}
.header-sub{font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:12px}
.header-status{display:flex;justify-content:center;gap:16px;font-size:11px;color:rgba(255,255,255,0.5)}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#2ec4b6;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:88px;z-index:99}
.tab{flex:1;padding:14px 0;text-align:center;font-size:13px;color:var(--muted);cursor:pointer;position:relative;transition:color 0.2s;-webkit-user-select:none;user-select:none}
.tab.active{color:var(--accent);font-weight:700}
.tab.active::after{content:'';position:absolute;bottom:0;left:30%;right:30%;height:3px;background:var(--accent);border-radius:3px}

/* Sections */
.section{display:none;padding:16px}
.section.active{display:block}

/* Industry Selector */
.industry-row{display:flex;gap:10px;margin-bottom:16px}
.industry-btn{flex:1;background:var(--card);border:2px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:all 0.2s;-webkit-user-select:none;user-select:none}
.industry-btn.active{border-color:var(--accent);background:rgba(232,65,60,0.04)}
.industry-btn .icon{font-size:22px;display:block;margin-bottom:4px}
.industry-btn .label{font-size:12px;color:var(--muted);font-weight:600}
.industry-btn.active .label{color:var(--accent)}

/* Company Chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.chip{padding:6px 14px;background:#fff;border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.2s;-webkit-user-select:none;user-select:none}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Input Area */
.input-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:16px}
.input-field{width:100%;border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:15px;outline:none;resize:none;min-height:60px;font-family:inherit;line-height:1.6;transition:border-color 0.2s}
.input-field:focus{border-color:var(--accent)}
.input-field::placeholder{color:#ccc}
.input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.char-count{font-size:11px;color:var(--muted)}
.translate-btn{background:var(--accent);color:#fff;border:none;padding:10px 28px;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.2s;-webkit-user-select:none;user-select:none}
.translate-btn:active{opacity:0.8}

/* Quick Tags */
.card-label{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px}
.quick-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.quick-tag{padding:6px 12px;background:#fff;border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text);cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.quick-tag:active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Result Area */
#resultArea{margin-bottom:16px}
.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.result-header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--border)}
.result-header .title{font-size:16px;font-weight:800}
.risk-badge{padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700}
.risk-1{background:#e8f8f5;color:#0e6655}
.risk-2{background:#fef9e7;color:#9a7d0a}
.risk-3{background:#fdebd0;color:#a04000}
.risk-4{background:#fadbd8;color:#922b21}
.risk-5{background:#e8daef;color:#6c3483}
.risk-6{background:#1a1a2e;color:#fff}
.result-body{padding:16px}
.result-row{margin-bottom:16px}
.result-row:last-child{margin-bottom:0}
.result-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
.result-value{font-size:14px;line-height:1.8;color:#333}
.highlight{color:var(--accent);font-weight:600}

/* Psych Tags */
.psych-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:4px;margin-right:4px}
.psych-def{background:#fdebd0;color:#a04000}
.psych-imp{background:#d4efdf;color:#1e8449}
.psych-mgmt{background:#d6eaf8;color:#2471a3}
.psych-face{background:#f5eef8;color:#7d3c98}
.psych-power{background:#fadbd8;color:#922b21}
.psych-nc{background:#e8f8f5;color:#0e6655}

/* Advice */
.advice-box{background:#fef9e7;border-radius:12px;padding:14px;margin-top:4px}
.advice-box .title{font-size:13px;font-weight:700;color:#9a7d0a;margin-bottom:6px}
.advice-box .text{font-size:13px;line-height:1.8;color:#666}

/* Share Bar */
#shareBar{display:none;text-align:center;margin-bottom:16px}
.share-btn{background:var(--accent2);color:#fff;border:none;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.2s;-webkit-user-select:none;user-select:none}
.share-btn:active{opacity:0.8}

/* Library */
.lib-item{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:var(--shadow);-webkit-user-select:none;user-select:none}
.lib-item:active{transform:scale(0.98)}
.lib-phrase{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px}
.lib-meta{display:flex;gap:8px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.lib-company{background:rgba(232,65,60,0.08);color:var(--accent);padding:2px 8px;border-radius:8px}
.lib-sub{color:#999}

/* History */
.history-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;line-height:2}
.history-item{background:var(--card);border-radius:12px;padding:14px;margin-bottom:8px;box-shadow:var(--shadow)}
.history-phrase{font-size:14px;font-weight:600;margin-bottom:4px}
.history-sub{font-size:12px;color:var(--muted)}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,0.8);color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Footer */
.footer{text-align:center;padding:20px;font-size:11px;color:var(--muted);line-height:1.8}
.footer span{color:var(--accent);font-weight:700}
</style>
</head>

function aiInfer(phrase, industry) {
  var lower = phrase.toLowerCase();
  var sub = '';
  var risk = 2;
  var riskText = '常规客套';
  var psych = [];

  if(/领导|老板|上面|高层|审批/.test(lower)) {
    sub = '说话人在借用权威或程序来增强自己立场的正当性，同时规避个人责任。可能是真有上级意见，也可能是虚构的挡箭牌。';
    risk = 3; riskText = '隐性施压';
    psych = [
      {name:'权威借用',type:'power',desc:'利用权威人物增强说服力，同时转移否定责任'},
      {name:'服从暗示',type:'imp',desc:'暗示你应该服从更高层级，利用权力距离心理压制追问'}
    ];
  } else if(/优化|调整|改改|修改|完善/.test(lower)) {
    sub = '说话人不满意当前结果，但不愿给出具体反馈方向。用模糊的改进要求让执行者自己猜，同时保留自己的评价权。';
    risk = 3; riskText = '隐性施压';
    psych = [
      {name:'评价回避',type:'def',desc:'管理者回避给出具体反馈，用模糊指令转移定义问题的责任'},
      {name:'权力展示',type:'power',desc:'通过保留"要求更多"的权力来建立层级优势'}
    ];
  } else if(/研究|看看|考虑|评估|商量|讨论/.test(lower)) {
    sub = '说话人在使用拖延策略，不直接给出答复。在职场中，"再看看"大概率等于"不做"或"否定"。';
    risk = 4; riskText = '变相拒绝';
    psych = [
      {name:'决策拖延',type:'nc',desc:'不决策本身就是一种决策。利用对方的乐观偏差降低追问频率'},
      {name:'面子保护',type:'face',desc:'给双方留台阶——对方面子上"还在考虑"，你的面子上"没被直接拒绝"'}
    ];
  } else if(/辛苦|感谢|不错|可以|挺好的/.test(lower) && lower.length < 20) {
    sub = '标准的职场客套用语，情感含量较低。频率越高越可能是程式化表达，不代表真实的认可。';
    risk = 2; riskText = '常规客套';
    psych = [
      {name:'社交润滑剂',type:'face',desc:'降低职场互动摩擦的礼貌用语，高频使用=低情感含量'},
      {name:'互惠暗示',type:'imp',desc:'暗示"我看到了你的付出"，可能在为后续的请求做铺垫'}
    ];
  } else if(/忙|排期|资源|人力|时间不够/.test(lower)) {
    sub = '用资源限制作为挡箭牌。"忙"在职场中是最安全的拒绝理由，几乎不会被追问。';
    risk = 3; riskText = '隐性施压';
    psych = [
      {name:'身份信号',type:'power',desc:'"忙"=我的时间有价值，暗示你的请求优先级不够'},
      {name:'社会交换',type:'imp',desc:'暗示你的请求回报率不够高，不值得我投入资源'}
    ];
  } else if(/但是|不过|然而/.test(lower)) {
    sub = '在职场沟通中，"但是"之前的内容通常是为了降低拒绝冲击的铺垫，"但是"之后才是说话人的真实意图。';
    risk = 3; riskText = '隐性施压';
    psych = [
      {name:'三明治反馈',type:'nc',desc:'经典沟通结构：先肯定再否定。前面的夸是缓冲剂，后面的才是核心'},
      {name:'认知对比',type:'face',desc:'先给正面信息，再用转折制造对比，让负面信息冲击力更强（也可以反过来使用）'}
    ];
  } else {
    sub = '这句话看似简单，但结合具体语境和说话人的身份、语气、场景，可能隐藏着更深层的意图。建议结合上下文综合判断。';
    risk = 2; riskText = '常规客套';
    psych = [
      {name:'语境依赖',type:'imp',desc:'职场话术的含义高度依赖语境（说话人身份、场景、语气、时机），脱离语境的翻译准确度有限'},
      {name:'模糊表达',type:'nc',desc:'职场中大量使用模糊语言，这种模糊性本身是一种策略——给双方都留了解读空间'}
    ];
  }

  var advice = '建议补充上下文信息后重新翻译，包括：谁说的（职级）、什么场合（会议/私聊/邮件）、前后文是什么。';
  if (risk >= 4) {
    advice = '这句话有较高的潜台词风险。建议直接追问具体条件和时间节点，把模糊表达变成明确答复。';
  }

  return {phrase:phrase, industry:industry, companies:[], surface:phrase, sub:sub, risk:risk, riskText:riskText, psychology:psych, advice:advice};
}

// ===== UI FUNCTIONS =====
function updateClock() {
  var now = new Date();
  var h = now.getHours().toString();
  var m = now.getMinutes().toString();
  if (h.length < 2) h = '0' + h;
  if (m.length < 2) m = '0' + m;
  document.getElementById('statusTime').textContent = h + ':' + m;
}
setInterval(updateClock, 30000);
updateClock();

// Tab switching
function switchTab(idx) {
  var tabs = document.querySelectorAll('.tab');
  var secs = document.querySelectorAll('.section');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove('active');
    secs[i].classList.remove('active');
  }
  tabs[idx].classList.add('active');
  document.getElementById('sec' + idx).classList.add('active');
  if (idx === 2) renderHistory();
}

function selectIndustry(idx) {
  currentIndustry = idx;
  var btns = document.querySelectorAll('.industry-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btns[idx].classList.add('active');
  renderCompanies();
  renderQuickPhrases();
}

function renderCompanies() {
  var cont = document.getElementById('companyChips');
  var list = companies[currentIndustry];
  var html = '';
  for (var i = 0; i < list.length; i++) {
    html += '<div class="chip' + (i === 0 ? ' active' : '') + '" data-company="' + list[i] + '">' + list[i] + '</div>';
  }
  cont.innerHTML = html;
  currentCompany = list[0];

  cont.onclick = function(e) {
    var chip = e.target.closest('.chip');
    if (!chip) return;
    var chips = cont.querySelectorAll('.chip');
    for (var j = 0; j < chips.length; j++) chips[j].classList.remove('active');
    chip.classList.add('active');
    currentCompany = chip.getAttribute('data-company');
  };
}

function renderQuickPhrases() {
  var phrases = [];
  for (var i = 0; i < db.length; i++) {
    if (db[i].industry === currentIndustry && phrases.length < 8) phrases.push(db[i]);
  }
  var html = '';
  for (var j = 0; j < phrases.length; j++) {
    html += '<div class="quick-tag" data-phrase="' + escapeAttr(phrases[j].phrase) + '">' + escapeHtml(phrases[j].phrase) + '</div>';
  }
  var cont = document.getElementById('quickPhrases');
  cont.innerHTML = html;

  cont.onclick = function(e) {
    var tag = e.target.closest('.quick-tag');
    if (!tag) return;
    document.getElementById('inputField').value = tag.getAttribute('data-phrase');
    updateCount();
    translate();
  };
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escapeAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateCount() {
  document.getElementById('charCount').textContent = document.getElementById('inputField').value.length;
}

function translate() {
  var phrase = document.getElementById('inputField').value.trim();
  if (!phrase) { showToast('请输入话术内容'); return; }

  var result = null;
  for (var i = 0; i < db.length; i++) {
    if (db[i].industry === currentIndustry && db[i].phrase === phrase) { result = db[i]; break; }
  }
  if (!result) {
    for (var j = 0; j < db.length; j++) {
      if (db[j].phrase === phrase) { result = db[j]; break; }
    }
  }
  if (!result) result = aiInfer(phrase, currentIndustry);

  renderResult(result);

  historyList.unshift({
    phrase: phrase,
    company: currentCompany,
    sub: result.sub,
    risk: result.risk,
    riskText: result.riskText,
    time: new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})
  });
  if (historyList.length > 20) historyList.pop();
}

function renderResult(r) {
  var area = document.getElementById('resultArea');
  var rl = riskLevels[r.risk];
  var psychHtml = '';
  for (var i = 0; i < r.psychology.length; i++) {
    var p = r.psychology[i];
    var pt = psychTypes[p.type] || psychTypes.imp;
    psychHtml += '<span class="psych-tag ' + pt.cls + '">' + pt.label + '</span>';
    psychHtml += '<div style="margin-bottom:8px;font-size:13px;line-height:1.7">';
    psychHtml += '<strong style="color:var(--text)">' + p.name + '：</strong>';
    psychHtml += '<span style="color:#666">' + p.desc + '</span></div>';
  }

  area.innerHTML = '<div class="result-card">'
    + '<div class="result-header">'
    + '<span class="title">翻译结果</span>'
    + '<span class="risk-badge ' + rl.cls + '">' + rl.icon + ' ' + r.riskText + '</span>'
    + '</div>'
    + '<div class="result-body">'
    + '<div class="result-row"><div class="result-label">[ ] 表面意思</div><div class="result-value">' + escapeHtml(r.surface) + '</div></div>'
    + '<div class="result-row"><div class="result-label">[ ] 真实潜台词</div><div class="result-value"><span class="highlight">' + escapeHtml(r.sub) + '</span></div></div>'
    + '<div class="result-row"><div class="result-label">[ ] 心理学解码</div><div style="margin-top:6px">' + psychHtml + '</div></div>'
    + '<div class="advice-box"><div class="title">[ ] 应对建议</div><div class="text">' + escapeHtml(r.advice) + '</div></div>'
    + '</div></div>';

  document.getElementById('shareBar').style.display = 'block';
  setTimeout(function(){ area.scrollIntoView({behavior:'smooth',block:'start'}); }, 100);
}

function renderLibrary() {
  var list = document.getElementById('libraryList');
  var indNames = ['互联网','保险','实业'];
  var html = '';
  for (var i = 0; i < db.length; i++) {
    var d = db[i];
    var subPreview = d.sub.length > 25 ? d.sub.slice(0,25) + '...' : d.sub;
    html += '<div class="lib-item" data-phrase="' + escapeAttr(d.phrase) + '" data-industry="' + d.industry + '">'
      + '<div class="lib-phrase">"' + escapeHtml(d.phrase) + '"</div>'
      + '<div class="lib-meta">'
      + '<span class="lib-company">' + escapeHtml(d.companies[0]||'') + '</span>'
      + '<span class="lib-company">' + indNames[d.industry] + '</span>'
      + '<span class="lib-sub">- ' + escapeHtml(subPreview) + '</span>'
      + '</div></div>';
  }
  list.innerHTML = html;

  list.onclick = function(e) {
    var item = e.target.closest('.lib-item');
    if (!item) return;
    var phrase = item.getAttribute('data-phrase');
    var industry = parseInt(item.getAttribute('data-industry'));
    switchTab(0);
    selectIndustry(industry);
    setTimeout(function(){
      document.getElementById('inputField').value = phrase;
      updateCount();
      translate();
    }, 50);
  };
}

function renderHistory() {
  var list = document.getElementById('historyList');
  if (historyList.length === 0) {
    list.innerHTML = '<div class="history-empty">暂无翻译记录<br>去翻译一条试试吧</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < historyList.length; i++) {
    var h = historyList[i];
    var rl = riskLevels[h.risk];
    html += '<div class="history-item">'
      + '<div class="history-phrase">"' + escapeHtml(h.phrase) + '"</div>'
      + '<div class="history-sub">' + escapeHtml(h.company) + ' | ' + rl.icon + ' ' + h.riskText + ' | ' + h.time + '</div>'
      + '</div>';
  }
  list.innerHTML = html;
}

function shareResult() {
  var text = '大厂潜台词翻译器\n输入：' + document.getElementById('inputField').value + '\n快去体验';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
    showToast('链接已复制，发给同事吧');
  } else {
    showToast('请截图分享给同事');
  }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

// ===== EVENT BINDING =====
document.addEventListener('DOMContentLoaded', function() {
  // Tabs
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    (function(idx){
      tabs[idx].addEventListener('click', function(){ switchTab(idx); });
    })(i);
  }

  // Industry buttons
  var indBtns = document.querySelectorAll('.industry-btn');
  for (var j = 0; j < indBtns.length; j++) {
    (function(idx){
      indBtns[idx].addEventListener('click', function(){ selectIndustry(idx); });
    })(j);
  }

  // Translate button
  document.getElementById('translateBtn').addEventListener('click', translate);

  // Share button
  document.getElementById('shareBtn').addEventListener('click', shareResult);

  // Init
  renderCompanies();
  renderQuickPhrases();
  renderLibrary();
  renderHistory();
});
</script>
</body>
</html>
